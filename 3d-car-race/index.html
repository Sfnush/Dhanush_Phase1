<!DOCTYPE html>
<html>
<head>
    <title>Realistic 3D Drive - Dhanush</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 10px; right: 10px; color: white; font-family: sans-serif; font-size: 20px; z-index: 100; }
        
        /* കൺട്രോൾ പാനൽ */
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 100; }
        
        /* സ്റ്റിയറിംഗ് */
        #steering-container { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid #fff; }
        #steering { width: 100px; transition: transform 0.1s; }

        /* പെഡലുകൾ */
        .pedals { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        .pedal { width: 60px; height: 100px; border-radius: 10px; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; border: 2px solid white; -webkit-user-select: none; }
        #accel { background: rgba(0, 255, 0, 0.4); height: 120px; }
        #brake { background: rgba(255, 0, 0, 0.4); height: 80px; }
    </style>
</head>
<body>
    <div id="ui">Speed: 0 km/h</div>
    
    <div class="controls">
        <div id="steering-container">
            <img id="steering" src="https://cdn-icons-png.flaticon.com/512/190/190240.png" alt="Steering">
        </div>

        <div class="pedals">
            <div id="brake" class="pedal">BRAKE</div>
            <div id="accel" class="pedal">ACCEL</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, road;
        let speed = 0, angle = 0;
        let isAccel = false, isBrake = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // ആകാശം നീല നിറം

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 8);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // ലൈറ്റുകൾ
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 5);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040));

            // റോഡ്
            const roadGeo = new THREE.PlaneGeometry(10, 2000);
            const roadMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // കാർ (കൂടുതൽ റിയലിസ്റ്റിക് ആയ രൂപം)
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 2.5), new THREE.MeshPhongMaterial({color: 0xff0000}));
            const roof = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 1.2), new THREE.MeshPhongMaterial({color: 0xffffff}));
            roof.position.y = 0.5;
            roof.position.z = -0.2;
            player = new THREE.Group();
            player.add(body);
            player.add(roof);
            player.position.y = 0.3;
            scene.add(player);

            setupControls();
            animate();
        }

        function setupControls() {
            const accelBtn = document.getElementById('accel');
            const brakeBtn = document.getElementById('brake');
            const steerImg = document.getElementById('steering');

            // ആക്സിലറേറ്റർ
            accelBtn.addEventListener('touchstart', () => isAccel = true);
            accelBtn.addEventListener('touchend', () => isAccel = false);

            // ബ്രേക്ക്
            brakeBtn.addEventListener('touchstart', () => isBrake = true);
            brakeBtn.addEventListener('touchend', () => isBrake = false);

            // സ്റ്റിയറിംഗ് (ടച്ച് മൂവ്മെന്റ് അനുസരിച്ച് തിരിയാൻ)
            window.addEventListener('touchmove', (e) => {
                let touchX = e.touches[0].clientX;
                if (touchX < window.innerWidth / 2) {
                    angle = (touchX - 60) / 60; // ലളിതമായ ഒരു ആംഗിൾ കണക്ക്
                    steerImg.style.transform = `rotate(${angle * 90}deg)`;
                }
            });
            window.addEventListener('touchend', () => {
                angle = 0;
                steerImg.style.transform = `rotate(0deg)`;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // സ്പീഡ് ലോജിക്
            if (isAccel) speed += 0.01;
            else if (isBrake) speed -= 0.05;
            else speed *= 0.98; // തനിയെ നിൽക്കാൻ

            if (speed < 0) speed = 0;
            if (speed > 0.8) speed = 0.8;

            // മൂവ്മെന്റ്
            player.position.z -= speed;
            player.position.x += angle * speed;
            
            // ക്യാമറ കാറിനൊപ്പം നീങ്ങാൻ
            camera.position.z = player.position.z + 8;
            camera.position.x = player.position.x;

            document.getElementById('ui').innerText = "Speed: " + Math.round(speed * 200) + " km/h";
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
