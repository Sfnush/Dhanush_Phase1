<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhanush's Car Race</title>
    <style>
        body { margin: 0; background: #222; font-family: sans-serif; overflow: hidden; }
        #gameContainer { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        #road { 
            width: 300px; height: 100vh; background: #444; position: relative; 
            border-left: 5px solid white; border-right: 5px solid white; overflow: hidden;
        }
        .line { 
            width: 10px; height: 50px; background: white; position: absolute; 
            left: 145px; animation: moveLine 0.5s linear infinite; 
        }
        @keyframes moveLine { from { top: -100px; } to { top: 100vh; } }
        
        #player { 
            width: 50px; height: 80px; background: red; position: absolute; 
            bottom: 20px; left: 125px; border-radius: 5px; transition: 0.1s;
        }
        .enemy { 
            width: 50px; height: 80px; background: blue; position: absolute; 
            top: -100px; border-radius: 5px; 
        }
        #score { position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; z-index: 10; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Score: 0</div>
        <div id="road">
            <div class="line" style="top: 0;"></div>
            <div class="line" style="top: 150px;"></div>
            <div class="line" style="top: 300px;"></div>
            <div id="player"></div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const road = document.getElementById('road');
        const scoreElement = document.getElementById('score');
        let score = 0;
        let playerX = 125;

        // ടച്ച് കൺട്രോൾ
        document.addEventListener('touchstart', (e) => {
            if(e.touches[0].clientX < window.innerWidth / 2) {
                if(playerX > 10) playerX -= 50; // ഇടത്തേക്ക്
            } else {
                if(playerX < 240) playerX += 50; // വലത്തേക്ക്
            }
            player.style.left = playerX + 'px';
        });

        // ശത്രു കാറുകളെ ഉണ്ടാക്കാൻ
        function createEnemy() {
            const enemy = document.createElement('div');
            enemy.classList.add('enemy');
            enemy.style.left = Math.floor(Math.random() * 250) + 'px';
            road.appendChild(enemy);

            let enemyY = -100;
            let interval = setInterval(() => {
                enemyY += 5;
                enemy.style.top = enemyY + 'px';

                // സ്കോർ കൂട്ടാൻ
                if(enemyY > window.innerHeight) {
                    score++;
                    scoreElement.innerText = "Score: " + score;
                    clearInterval(interval);
                    road.removeChild(enemy);
                }

                // കൂട്ടിമുട്ടിയാൽ (Collision)
                let pRect = player.getBoundingClientRect();
                let eRect = enemy.getBoundingClientRect();
                if (!(pRect.right < eRect.left || pRect.left > eRect.right || pRect.bottom < eRect.top || pRect.top > eRect.bottom)) {
                    alert("Game Over! Score: " + score);
                    location.reload();
                }
            }, 20);
        }

        setInterval(createEnemy, 1500); // ഓരോ 1.5 സെക്കൻഡിലും പുതിയ കാർ വരും
    </script>
</body>
</html>
