<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
</head>
<body>
    <h2>Feedback</h2>
    <form>
        <label>Share your thoughts:</label><br>
        <textarea name="feedback" rows="4" cols="30"></textarea><br><br>
        
        <label>Rating (1-5):</label>
        <input type="number" name="rating" min="1" max="5"><br><br>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
